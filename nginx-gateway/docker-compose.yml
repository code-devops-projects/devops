version: '3.8'

services:
  nginx:
    build: .
    container_name: nginx-gateway
    ports:
      - "80:80"      # Puerto principal para el API Gateway
      - "443:443"    # Puerto para HTTPS
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    networks:
      - network_local_server
    depends_on:
      - backend_security
      - backend_ubication

  backend_security:
    image: devops-backend-security:latest
    container_name: backend-security
    expose:
      - "9000"
    networks:
      - network_local_server

  backend_ubication:
    image: devops-backend-ubication:latest
    container_name: backend-ubication
    expose:
      - "9000"
    networks:
      - network_local_server

networks:
  network_local_server:
    external: true 