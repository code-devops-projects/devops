services:
  # ==================== DESARROLLO ====================
  postgres-dev:
    container_name: ${PROJECT_NAME}-postgres-dev
    build:
      context: ../..
      dockerfile: Dockerfile
    restart: always
    env_file:
      - ../config/.env
      - .env
    environment:
      - POSTGRES_DB=${PROJECT_NAME}_${DB_NAME_BASE}_dev
    ports:
      - "${PORT_DEV}:5432"
    networks:
      - network_dev
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
      - ../../backups/dev:/backups/postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 30s
      timeout: 10s
      retries: 5
    labels:
      - com.${PROJECT_NAME}.group=${PROJECT_NAME}
      - com.${PROJECT_NAME}.environment=dev

# ==================== VOLÚMENES ====================
volumes:
  postgres_data_dev:
    driver: local
    name: ${PROJECT_NAME}_${VOLUME_PREFIX}_dev

# ==================== REDES ====================
networks:
  network_dev:
    driver: bridge
    name: ${PROJECT_NAME}_${NETWORK_PREFIX}_dev
